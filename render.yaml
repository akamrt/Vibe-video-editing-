services:
  - type: web
    name: vibecut-pro
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp && chmod +x yt-dlp
    startCommand: PATH=$PATH:/opt/render/project/src NODE_ENV=production node server/server.cjs
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
