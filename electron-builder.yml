appId: com.vibecut.ai
productName: VibeCut AI
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - server/**/*
  - electron/**/*.js
  - electron/**/*.html
  - package.json
extraResources:
  - from: bin/
    to: bin/
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: VibeCut AI
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.video
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.ico
  category: AudioVideo
